<!DOCTYPE html>
<html lang="en">
<head>

    <title>Le portfolio</title>
    <link rel="stylesheet" href="../styles.css">

<body>
    <div class="page_content">
        <div class="page_top">
            <div class="header">
                <img src="../images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">
                <h1 class="page_title">Travis Zito</h1>
                <img src="../images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">
            </div>
            <div class="nav_bar">
                <div class="burger">
                    <img src="../images/svg_icons/menu.svg" alt="menu">
                </div>
                <div class="nav_links collapsed">
                    <div class="home">
                        <a href="home.html">Home</a>

            <div class="light_switch">

            <div class="projects_wrapper">
                <div class="project_card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/chess#lib/main.rb')">

                    <div class="photo game" style="background-image: url('../images/project_screenshots/chess.jpg');"></div>

                <div class="project_card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/Ruby-Mastermind#main.rb')">

                        <button class="github clickable" onclick="linkToGithub(event, 'https://github.com/TravTheBav/Ruby-Mastermind')"></button>

                </div>
                <div class="project_card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/connect-four#lib/main.rb')">

                    </div>
