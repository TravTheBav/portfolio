<body>
    <div class="page_content">
        <div class="page_top">
            <div class="header">
                <img src="images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">
                <h1 class="page_title">Travis Zito</h1>
                <img src="images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">

            <div class="nav_bar">
                <div class="burger">
                    <img src="images/svg_icons/menu.svg" alt="menu">

                <div class="nav_links collapsed">
                    <div><a href="home.html">Home</a></div>
                    <div><a href="about.html">About</a></div>
                    <div class="flex"><button class="github clickable icon small-icon" onclick="openInNewTab('https://github.com/TravTheBav')"></button></div>

                <img src="images/doom_textures/switch_on.png" alt="light_switch">

            <div class="projects_wrapper">
                <div class="project_card clickable" onclick="openInNewTab('https://travthebav.github.io/matzo-soup-recipe/')">

                </div>
                <div class="project_card clickable" onclick="openInNewTab('https://travthebav.github.io/landing_page/')">

                </div>
                <div class="project_card clickable" onclick="openInNewTab('https://travthebav.github.io/admin-dashboard/')">

                </div>
                <div class="project_card clickable" onclick="openInNewTab('https://travthebav.github.io/Etch-a-Sketch/')">

                    <div class="photo" style="background-image: url('images/project_screenshots/etch_a_sketch.jpg'); background-position: center;"></div>
                    <div class="links">
                        <button class="github clickable icon medium-icon" onclick="linkToGithub(event, 'https://github.com/TravTheBav/Etch-a-Sketch')"></button>
