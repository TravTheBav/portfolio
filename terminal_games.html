<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Travis Zito | Portfolio | Terminal Games</title>
    <link rel="stylesheet" href="styles.css">

<body>
    <div class="page-content">
        <div class="page-top">
            <header class="site-wide-banner">
                <img src="images/doom_gifs/lamp.gif" class="lamp">
                <h1 class="page-title">Travis Zito</h1>
                <img src="images/doom_gifs/lamp.gif" class="lamp">
            </header>
            <nav class="nav-bar">
                <div class="burger">
                    <img src="images/svg_icons/menu.svg" alt="menu">
                </div>
                <div class="nav-links collapsed">
                    <div><a href="home.html">Home</a></div>
                    <div><a href="about.html">About</a></div>
                    <div class="flex"><button class="github clickable icon small-icon" onclick="openInNewTab('https://github.com/TravTheBav')"></button></div>
                    <div class="flex"><button class="linked-in clickable icon small-icon" onclick="openInNewTab('https://www.linkedin.com/in/travis-zito-24aa5a14a/')"></button></div>
                </div>
            </nav>
            <div class="page-theme-toggler">
                <img src="images/doom_textures/switch_on.png" alt="page-theme-toggler">
            </div>
        </div>
        <main>
            <h2 class="page-title sub">Terminal Games</h2>
            <div class="projects-wrapper">
                <div class="project-card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/chess#lib/main.rb')">
                    <h3>Chess</h3>
                    <div class="photo game" style="background-image: url('images/project_screenshots/chess.jpg');"></div>
                    <div class="links">
                        <button class="github clickable icon medium-icon" onclick="linkToGithub(event, 'https://github.com/TravTheBav/chess')"></button>
                    </div>
                </div>
                <div class="project-card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/Ruby-Mastermind#main.rb')">
                    <h3>Mastermind</h3>
                    <div class="photo game" style="background-image: url('images/project_screenshots/mastermind.jpg');"></div>
                    <div class="links">
                        <button class="github clickable icon medium-icon" onclick="linkToGithub(event, 'https://github.com/TravTheBav/Ruby-Mastermind')"></button>
                    </div>
                </div>
                <div class="project-card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/connect-four#lib/main.rb')">
                    <h3>Connect Four</h3>
                    <div class="photo game" style="background-image: url('images/project_screenshots/connect-four.jpg');"></div>
                    <div class="links">
                        <button class="github clickable icon medium-icon" onclick="linkToGithub(event, 'https://github.com/TravTheBav/connect-four')"></button>
                    </div>
                </div>                
                <div class="project-card clickable" onclick="openInNewTab('https://replit.com/@TravTheBav/Minesweeper')">

                    <div class="photo game" style="background-image: url('images/project_screenshots/minesweeper.jpg');"></div>

                        <button class="github clickable icon medium-icon" onclick="linkToGithub(event, 'https://github.com/TravTheBav/minesweeper')"></button>
                    </div>
                </div>               
            </div>

    </div>
    <script src="scripts/main.js"></script>
