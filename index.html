<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light">
    <div class="container">
        <div class="door">
            <button class="door_bell">Enter The Experience</button>
        </div>
        <div class="status_bar">
            <div class="left_status_bar"></div>
            <div class="portrait"></div>
            <div class="right_status_bar"></div>
        </div>
    </div>
    <div class="page_content">
        <div class="page_top">
            <div class="header">
                <img src="images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">
                <h1 class="page_title">Travis Zito</h1>
                <img src="images/doom_gifs/lamp.gif" alt="spectral_lamp" class="lamp">
            </div>
            <div class="nav_bar">
                <div class="about">about</div>
                <div class="git_hub">github</div>
                <div class="reddit">reddit</div>
            </div>
            <div class="light_switch">
                <img src="images/doom_textures/switch_on.png" alt="light_switch" class="light">
            </div>
        </div>
        <div class="page_middle">
            <li class="index_menu">
                <ul class="category">                    
                    <img src="images/doom_textures/web_templates.png" alt="web templates" class="index_category">
                    <img src="images/doom_gifs/skull_box.gif" alt="spinning skull" class="skull_box">
                </ul>
                <ul class="category">
                    <img src="images/doom_textures/calculators.png" alt="calculators" class="index_category">
                    <img src="images/doom_gifs/skull_box.gif" alt="spinning skull" class="skull_box">
                </ul>
                <ul class="category">
                    <img src="images/doom_textures/terminal_games.png" alt="terminal games" class="index_category">
                    <img src="images/doom_gifs/skull_box.gif" alt="spinning skull" class="skull_box">
                </ul>
            </li>
        </div>
    </div>    
    <script src="script.js"></script>
</body>
</html>
